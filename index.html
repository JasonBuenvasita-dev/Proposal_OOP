<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart | Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #f0f2ff;
            --card-bg: rgba(255,255,255,0.95);
            --card-border: rgba(109,40,217,0.12);
            --text: #1e1b4b;
            --text-muted: #6b7280;
            --accent: #7c3aed;
            --accent2: #0ea5e9;
            --input-bg: #f8f7ff;
            --input-border: #e0d9ff;
            --shadow: 0 8px 32px rgba(109,40,217,0.10);
        }
        [data-theme="dark"] {
            --bg: #0f0e1a;
            --card-bg: rgba(22,20,40,0.97);
            --card-border: rgba(139,92,246,0.18);
            --text: #ede9fe;
            --text-muted: #9ca3af;
            --accent: #a78bfa;
            --accent2: #38bdf8;
            --input-bg: #1a1730;
            --input-border: #2e2850;
            --shadow: 0 8px 32px rgba(0,0,0,0.35);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans','Segoe UI',sans-serif;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }
        .header-section {
            background: linear-gradient(-45deg,#7c3aed,#0ea5e9,#f43f5e,#7c3aed);
            background-size: 320% 320%;
            animation: gradientShift 14s ease infinite;
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 32px 32px;
            box-shadow: 0 16px 48px rgba(109,40,217,0.30);
            margin-bottom: 30px;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            margin-bottom: 18px;
            color: var(--text);
        }
        .timer-num { font-size:3rem; font-weight:700; color:var(--accent); }
        .form-control, .form-select {
            background: var(--input-bg) !important;
            border: 1.5px solid var(--input-border) !important;
            color: var(--text) !important;
            border-radius: 10px !important;
        }
        .btn-save {
            background: linear-gradient(135deg,var(--accent),var(--accent2));
            color: white; border: none; border-radius: 10px;
            font-weight: 600; padding: 12px; width: 100%;
        }
        .table { color:var(--text); font-size:0.9rem; }
        .badge { border-radius:20px; padding:4px 12px; font-size:0.75rem; font-weight:600; }
        .badge-high { background: #ef4444; color: white; }
        .badge-medium { background: #f59e0b; color: white; }
        .badge-low { background: #22c55e; color: white; }
        
        #syncStatus { font-size:0.75rem; padding:3px 10px; border-radius:20px; }
        .sync-ok { background:rgba(34,197,94,0.15); color:#16a34a; }
        
        /* Focus Mode Styles */
        .focus-active .header-section, .focus-active .left-col { display:none; }
        .focus-active .right-col { width:100%; flex:0 0 100%; }
        .exit-focus { display: none; position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .focus-active .exit-focus { display: block; }
    </style>
</head>
<body>

<button class="btn btn-danger exit-focus shadow" onclick="toggleFocus()">❌ Exit Focus</button>

<div class="header-section">
    <h1>📚 STUDY SMART</h1>
    <p>Manage your Academic Deadlines Efficiently</p>
    <div class="d-flex justify-content-center gap-2 mt-3">
        <button class="btn btn-outline-light btn-sm px-3" onclick="toggleFocus()">🎯 Focus Mode</button>
        <button class="btn btn-outline-light btn-sm px-3" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>
</div>

<div class="container pb-5">
    <div id="statusMessage" class="alert d-none" role="status"></div>
    <div class="row">

        <div class="col-md-4 left-col">
            <div class="card p-3 text-center">
                <h6 class="mb-2">🍅 Pomodoro Timer</h6>
                <div class="timer-num" id="timerDisplay">25:00</div>
                <button class="btn btn-primary btn-sm mt-2 px-4" onclick="toggleTimer()" id="timerBtn">Start</button>
            </div>

            <div class="card p-4">
                <h5 class="mb-3">✏️ Add New Task</h5>
                <input type="text" id="task_name" class="form-control mb-2" placeholder="Task Name" />
                <input type="text" id="subject" class="form-control mb-2" placeholder="Subject (e.g. DBMS)" />
                <input type="date" id="deadline" class="form-control mb-2" />
                <select id="priority" class="form-select mb-3">
                    <option value="High">🔴 High</option>
                    <option value="Medium" selected>🟡 Medium</option>
                    <option value="Low">🟢 Low</option>
                </select>
                <button class="btn-save" id="saveBtn" onclick="saveTask()">Save Task</button>
            </div>
        </div>

        <div class="col-md-8 right-col">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0 fw-bold">Pending Tasks</h5>
                <div class="d-flex align-items-center gap-2">
                    <span id="syncStatus" class="sync-ok">☁️ Cloud Synced</span>
                    <span class="badge bg-primary" id="taskCounter">0 Tasks</span>
                </div>
            </div>
            <div class="card p-3">
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>Task</th><th>Subject</th><th>Deadline</th><th>Priority</th><th></th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody">
                            <tr><td colspan="5" class="text-center p-4 text-muted">Loading tasks...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const SUPABASE_URL = 'https://lafiafbqccrojlkjgcvk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TLRwCGXv6swosm6ntUguow_aRSkS0We';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showStatus(message, type = "success") {
        const box = document.getElementById('statusMessage');
        box.className = `alert alert-${type} d-block`;
        box.innerText = message;
        setTimeout(() => box.className = 'alert d-none', 3000);
    }

    async function fetchTasks() {
        const { data, error } = await db.from('tasks').select('*').order('deadline', { ascending: true });
        if (error) return;
        renderTable(data);
    }

    async function saveTask() {
        const name = document.getElementById('task_name').value;
        const subject = document.getElementById('subject').value || 'General';
        const deadline = document.getElementById('deadline').value;
        const priority = document.getElementById('priority').value;

        if (!name || !deadline) return showStatus("Fill in name and deadline", "warning");

        const { error } = await db.from('tasks').insert([{ task_name: name, subject, deadline, priority }]);
        if (!error) {
            showStatus("Task saved!");
            fetchTasks();
            document.getElementById('task_name').value = '';
            document.getElementById('deadline').value = '';
        }
    }

    async function deleteTask(id) {
        if (!confirm('Delete this task?')) return;
        await db.from('tasks').delete().eq('id', id);
        fetchTasks();
    }

    function renderTable(tasks) {
        const tbody = document.getElementById('taskTableBody');
        document.getElementById('taskCounter').innerText = tasks.length + ' Tasks';
        
        if (tasks.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4">No tasks found.</td></tr>`;
            return;
        }

        tbody.innerHTML = tasks.map(t => `
            <tr>
                <td><strong>${t.task_name}</strong></td>
                <td>${t.subject}</td>
                <td>${t.deadline}</td>
                <td><span class="badge badge-${t.priority.toLowerCase()}">${t.priority}</span></td>
                <td><button class="btn btn-sm text-danger" onclick="deleteTask(${t.id})">🗑</button></td>
            </tr>
        `).join('');
    }

    // Timer Logic
    let timeLeft = 1500, timerId = null;
    function toggleTimer() {
        const btn = document.getElementById('timerBtn');
        if (timerId) {
            clearInterval(timerId); timerId = null; btn.innerText = 'Start';
        } else {
            btn.innerText = 'Pause';
            timerId = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeLeft <= 0) { clearInterval(timerId); timerId = null; alert("Break time!"); }
            }, 1000);
        }
    }

    function toggleDarkMode() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    }

    function toggleFocus() { document.body.classList.toggle('focus-active'); }

    window.onload = fetchTasks;
</script>
</body>
</html>
