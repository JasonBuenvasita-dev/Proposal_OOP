<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart | Task Manager</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #f5f7ff;
            --text-color: #1b1f3b;
            --card-bg: rgba(255, 255, 255, 0.9);
            --surface-border: rgba(116, 99, 255, 0.2);
            --accent: #7463ff;
        }
        [data-theme="dark"] {
            --bg-color: #0f122d;
            --text-color: #eff0ff;
            --card-bg: rgba(25, 31, 68, 0.85);
            --surface-border: rgba(132, 121, 255, 0.4);
            --accent: #8d7bff;
        }

        body {
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 111, 145, 0.22), transparent 30%),
                radial-gradient(circle at 85% 15%, rgba(67, 224, 255, 0.24), transparent 34%),
                radial-gradient(circle at 75% 85%, rgba(255, 198, 79, 0.18), transparent 28%),
                var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.3s ease;
            min-height: 100vh;
        }
        
        .header-section { 
            background: linear-gradient(-45deg, #6a11cb, #2575fc, #00c6ff, #f857a6);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: white;
            padding: 44px;
            text-align: center;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 18px 30px rgba(22, 17, 72, 0.2);
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .card {
            background-color: var(--card-bg);
            color: var(--text-color);
            border-radius: 18px;
            border: 1px solid var(--surface-border);
            box-shadow: 0 10px 30px rgba(45, 48, 81, 0.15);
            margin-bottom: 20px;
            backdrop-filter: blur(8px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(35, 38, 74, 0.22);
        }

        .btn-primary {
            background: linear-gradient(135deg, #7463ff, #40c6ff);
            border: none;
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #3ad6a6);
            border: none;
        }
        .btn-outline-light:hover {
            color: #351a8f;
            background-color: #ffffff;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            background-color: rgba(255, 255, 255, 0.82);
        }
        [data-theme="dark"] .form-control, [data-theme="dark"] .form-select {
            background-color: rgba(255, 255, 255, 0.08);
            color: #eff0ff;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(116, 99, 255, 0.2);
        }

        .table tbody tr:hover {
            background-color: rgba(116, 99, 255, 0.08);
        }
        
        .badge-high { background-color: #ff5a74 !important; }
        .badge-medium { background-color: #ffbe4d !important; color: #1d1f2f !important; }
        .badge-low { background-color: #22c58b !important; }

        .focus-active .header-section, .focus-active .col-md-4 { display: none; }
        .focus-active .col-md-8 { width: 100%; }
    </style>
</head>
<body>

<div class="header-section mb-4">
    <h1>STUDY SMART</h1>
    <p>Manage your Academic Deadlines Efficiently</p>
    <div class="btn-group">
        <button class="btn btn-outline-light btn-sm" onclick="toggleFocus()">Focus Mode</button>
        <button class="btn btn-outline-light btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>🍅 Pomodoro Timer</h6>
                <h2 id="timerDisplay">25:00</h2>
                <button class="btn btn-primary btn-sm" onclick="toggleTimer()" id="timerBtn">Start</button>
            </div>

            <div class="card p-3">
                <h6 class="text-center">📊 Subject Distribution</h6>
                <canvas id="subjectChart"></canvas>
            </div>

            <div class="card p-4">
                <h5>Add New Task</h5>
                <form id="taskForm">
                    <input type="text" id="task_name" class="form-control mb-2" placeholder="Task Name" required>
                    <input type="text" id="subject" class="form-control mb-2" placeholder="Subject">
                    <input type="date" id="deadline" class="form-control mb-2" required>
                    <select id="priority" class="form-select mb-3">
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <button type="submit" class="btn btn-success w-100">Save Task</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 id="tableTitle">Pending Tasks</h5>
                <span class="badge bg-primary" id="taskCounter">0 Tasks</span>
            </div>
            <div class="card p-3">
                <table class="table" style="color: inherit;">
                    <thead>
                        <tr><th>Task</th><th>Subject</th><th>Deadline</th><th>Priority</th></tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
/* 1. SUPABASE INITIALIZATION */
// These credentials link your website to your specific Supabase project
const supabaseUrl = 'https://lafiafbqccrojlkjgcvk.supabase.co';
const supabaseKey = 'sb_publishable_TLRwCGXv6swosm6ntUguow_aRSkS0We'; 
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

/* 2. FETCH TASKS ON LOAD */
async function fetchTasks() {
    const { data: tasks, error } = await _supabase
        .from('tasks')
        .select('*')
        .order('id', { ascending: false });

    if (error) {
        console.error("Fetch Error:", error);
    } else if (tasks) {
        const tableBody = document.getElementById('taskTableBody');
        tableBody.innerHTML = ''; 
        let currentSubjectData = {};

        tasks.forEach(task => {
            const row = `<tr>
                <td>${task.task_name}</td>
                <td>${task.subject}</td>
                <td>${task.deadline}</td>
                <td><span class="badge badge-${task.priority.toLowerCase()}">${task.priority}</span></td>
            </tr>`;
            tableBody.insertAdjacentHTML('beforeend', row);
            
            // Collect chart data
            let subj = task.subject || "General";
            currentSubjectData[subj] = (currentSubjectData[subj] || 0) + 1;
        });

        document.getElementById('taskCounter').innerText = `${tasks.length} Tasks`;
        updateChart(currentSubjectData);
    }
}

/* 3. SAVE TASK */
document.getElementById('taskForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('task_name').value;
    const date = document.getElementById('deadline').value;

    const taskData = {
        task_name: name,
        subject: document.getElementById('subject').value || "General",
        deadline: date,
        priority: document.getElementById('priority').value
    };

    // Check if task is due within 24 hours
    checkDeadline(name, date);

    const { data, error } = await _supabase
        .from('tasks')
        .insert([taskData]);

    if (error) {
        alert("Error saving: " + error.message);
    } else {
        alert("Task saved to the cloud!");
        this.reset();
        fetchTasks(); // Refresh the table automatically
    }
});

/* 4. CHART LOGIC */
let myChart = null;
function updateChart(data) {
    const ctx = document.getElementById('subjectChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(data),
            datasets: [{ 
                data: Object.values(data), 
                backgroundColor: ['#3498db','#e74c3c','#2ecc71','#f1c40f'] 
            }]
        }
    });
}

/* 5. UTILITIES */
let timeLeft = 1500, timerId = null;
function toggleTimer() {
    if (timerId) { 
        clearInterval(timerId); 
        timerId = null; 
        document.getElementById('timerBtn').innerText = "Start"; 
    } else { 
        timerId = setInterval(() => { timeLeft--; updateTimerDisp(); }, 1000); 
        document.getElementById('timerBtn').innerText = "Pause"; 
    }
}

function updateTimerDisp() {
    let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
}

function checkDeadline(taskName, deadlineStr) {
    const diff = (new Date(deadlineStr) - new Date()) / (1000 * 60 * 60);
    if (diff > 0 && diff <= 24) alert(`⚠️ URGENT: "${taskName}" is due within 24 hours!`);
}

function toggleDarkMode() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function toggleFocus() { document.body.classList.toggle('focus-active'); }

// Run fetch on initial load
fetchTasks();
</script>
</body>
</html>
