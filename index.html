<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart | Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: radial-gradient(circle at top, #f8fcff 0%, #eef2ff 40%, #f9f0ff 100%);
            --text-color: #1f2937;
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: rgba(99, 102, 241, 0.2);
            --accent: #6d28d9;
            --accent-alt: #0ea5e9;
            --table-hover: rgba(79, 70, 229, 0.08);
        }

        [data-theme="dark"] {
            --bg-color: radial-gradient(circle at top, #101827 0%, #0f172a 45%, #111827 100%);
            --text-color: #e5e7eb;
            --card-bg: rgba(30, 41, 59, 0.88);
            --card-border: rgba(100, 116, 139, 0.28);
            --accent: #94a3b8;
            --accent-alt: #64748b;
            --table-hover: rgba(100, 116, 139, 0.16);
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s;
            min-height: 100vh;
        }

        .header-section {
            background: linear-gradient(-45deg, #7c3aed, #0ea5e9, #f43f5e, #7c3aed);
            background-size: 320% 320%;
            animation: gradient 14s ease infinite;
            color: white;
            padding: 48px 32px;
            text-align: center;
            border-radius: 0 0 28px 28px;
            box-shadow: 0 18px 45px rgba(79, 70, 229, 0.35);
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 28px rgba(79, 70, 229, 0.12);
            margin-bottom: 20px;
            backdrop-filter: blur(8px);
        }

        .badge-high { background: linear-gradient(135deg, #ef4444, #dc2626) !important; }
        .badge-medium { background: linear-gradient(135deg, #facc15, #f59e0b) !important; color: #111827 !important; }
        .badge-low { background: linear-gradient(135deg, #22c55e, #16a34a) !important; }

        #statusMessage {
            margin-bottom: 12px;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.92rem;
            font-weight: 600;
            display: none;
        }

        .show-msg { display: block !important; }

        .focus-active .header-section, .focus-active .col-md-4 { display: none; }
        .focus-active .col-md-8 { width: 100%; }
    </style>
</head>
<body>

<div class="header-section mb-4">
    <h1>STUDY SMART</h1>
    <p>Manage your Academic Deadlines Efficiently</p>
    <div class="btn-group">
        <button class="btn btn-outline-light btn-sm" onclick="toggleFocus()">Focus Mode</button>
        <button class="btn btn-outline-light btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
    </div>
</div>

<div class="container">
    <div id="statusMessage" class="alert" role="status"></div>
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>🍅 Pomodoro Timer</h6>
                <h2 id="timerDisplay">25:00</h2>
                <button class="btn btn-primary btn-sm" onclick="toggleTimer()" id="timerBtn">Start</button>
            </div>

            <div class="card p-3">
                <h6 class="text-center">📊 Subject Distribution</h6>
                <canvas id="subjectChart"></canvas>
            </div>

            <div class="card p-4">
                <h5>Add New Task</h5>
                <form id="taskForm">
                    <input type="text" id="task_name" class="form-control mb-2" placeholder="Task Name" required>
                    <input type="text" id="subject" class="form-control mb-2" placeholder="Subject">
                    <input type="date" id="deadline" class="form-control mb-2" required>
                    <select id="priority" class="form-select mb-3">
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <button type="submit" class="btn btn-success w-100">Save Task</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5>Pending Tasks</h5>
                <span class="badge bg-primary" id="taskCounter">0 Tasks</span>
            </div>
            <div class="card p-3">
                <table class="table" style="color: inherit;">
                    <thead>
                        <tr><th>Task</th><th>Subject</th><th>Deadline</th><th>Priority</th></tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// 1. SUPABASE INITIALIZATION
const supabaseUrl = 'https://hjdkiwuhclyohphtwwai.supabase.co';
const supabaseKey = 'sb_publishable_TLRwCGXv6swosm6ntUguow_aRSkS0We';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

window.alert = function() {};

// 2. SHOW STATUS MESSAGE
function showStatus(message, type = "info") {
    const box = document.getElementById('statusMessage');
    box.className = `alert alert-${type === 'warning' ? 'danger' : type} show-msg`;
    box.innerText = message;
    setTimeout(() => { box.classList.remove('show-msg'); }, 4000);
}

// 3. FETCH TASKS & UPDATE CHART
let myChart = null;

function addTaskRow(task) {
    const tableBody = document.getElementById('taskTableBody');
    const row = `<tr>
        <td>${task.task_name}</td>
        <td>${task.subject || "General"}</td>
        <td>${task.deadline}</td>
        <td><span class="badge badge-${task.priority.toLowerCase()}">${task.priority}</span></td>
    </tr>`;
    tableBody.insertAdjacentHTML('beforeend', row);
}

async function fetchTasks() {
    const { data: tasks, error } = await _supabase
        .from('tasks')
        .select('*')
        .order('id', { ascending: false });

    if (error) {
        showStatus("Could not sync with cloud", "warning");
        return;
    }

    const tableBody = document.getElementById('taskTableBody');
    tableBody.innerHTML = '';
    let currentSubjectData = {};

    tasks.forEach(task => {
        addTaskRow(task);
        let subj = task.subject || "General";
        currentSubjectData[subj] = (currentSubjectData[subj] || 0) + 1;
    });

    document.getElementById('taskCounter').innerText = `${tasks.length} Tasks`;
    updateChart(currentSubjectData);
}

function updateChart(data) {
    const ctx = document.getElementById('subjectChart').getContext('2d');
    if (myChart) myChart.destroy();
    if (Object.keys(data).length === 0) return;

    myChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(data),
            datasets: [{ 
                data: Object.values(data), 
                backgroundColor: ['#6d28d9','#0ea5e9','#f43f5e','#10b981', '#f59e0b'] 
            }]
        },
        options: {
            plugins: {
                legend: { position: 'bottom', labels: { color: getComputedStyle(document.body).getPropertyValue('--text-color') } }
            }
        }
    });
}

// 4. SAVE TASK
document.getElementById('taskForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const taskData = {
        task_name: document.getElementById('task_name').value,
        subject: document.getElementById('subject').value || "General",
        deadline: document.getElementById('deadline').value,
        priority: document.getElementById('priority').value
    };

    const { error } = await _supabase.from('tasks').insert([taskData]);

    if (error) {
        showStatus("Save Error: " + error.message, "warning");
    } else {
        showStatus("Task saved successfully!", "success");
        this.reset();
        fetchTasks(); 
    }
});

// 5. UTILITIES
let timeLeft = 1500, timerId = null;
function toggleTimer() {
    if (timerId) { clearInterval(timerId); timerId = null; document.getElementById('timerBtn').innerText = "Start"; }
    else { timerId = setInterval(() => { timeLeft--; updateTimerDisp(); if(timeLeft<=0) { clearInterval(timerId); showStatus("Time's up!", "info"); } }, 1000); document.getElementById('timerBtn').innerText = "Pause"; }
}
function updateTimerDisp() {
    let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
}
function toggleDarkMode() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    if(myChart) fetchTasks(); 
}
function toggleFocus() { document.body.classList.toggle('focus-active'); }

window.onload = fetchTasks;
</script>
</body>
</html>
