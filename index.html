<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart | Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --bg-color: #f8f9fa; --text-color: #212529; --card-bg: #ffffff; }
        [data-theme="dark"] { --bg-color: #1a1a1a; --text-color: #f8f9fa; --card-bg: #2d2d2d; }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        
        .header-section { 
            background: linear-gradient(-45deg, #2c3e50, #4ca1af, #2c3e50);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white; padding: 40px; text-align: center; border-radius: 0 0 20px 20px;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .card { background-color: var(--card-bg); color: var(--text-color); border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Priority Colors */
        .badge-high { background-color: #e74c3c !important; }
        .badge-medium { background-color: #f1c40f !important; color: black !important; }
        .badge-low { background-color: #2ecc71 !important; }

        .focus-active .header-section, .focus-active .col-md-4 { display: none; }
        .focus-active .col-md-8 { width: 100%; }
    </style>
</head>
<body>

<div class="header-section mb-4">
    <h1>STUDY SMART</h1>
    <p>Manage your Academic Deadlines Efficiently</p>
    <div class="btn-group">
        <button class="btn btn-outline-light btn-sm" onclick="toggleFocus()">Focus Mode</button>
        <button class="btn btn-outline-light btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>🍅 Pomodoro Timer</h6>
                <h2 id="timerDisplay">25:00</h2>
                <button class="btn btn-primary btn-sm" onclick="toggleTimer()" id="timerBtn">Start</button>
            </div>

            <div class="card p-3">
                <h6 class="text-center">📊 Subject Distribution</h6>
                <canvas id="subjectChart"></canvas>
            </div>

            <div class="card p-4">
                <h5>Add New Task</h5>
                <form id="taskForm">
                    <input type="text" id="task_name" class="form-control mb-2" placeholder="Task Name" required>
                    <input type="text" id="subject" class="form-control mb-2" placeholder="Subject">
                    <input type="date" id="deadline" class="form-control mb-2" required>
                    <select id="priority" class="form-select mb-3">
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <button type="submit" class="btn btn-success w-100">Save Task</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 id="tableTitle">Pending Tasks</h5>
                <span class="badge bg-primary" id="taskCounter">0 Tasks</span>
            </div>
            <div class="card p-3">
                <table class="table" style="color: inherit;">
                    <thead>
                        <tr><th>Task</th><th>Subject</th><th>Deadline</th><th>Priority</th></tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
/* DARK MODE */
function toggleDarkMode() {
    const body = document.body;
    const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    body.setAttribute('data-theme', theme);
}

/* NOTIFICATION SYSTEM */
function checkDeadline(taskName, deadlineStr) {
    const today = new Date();
    const due = new Date(deadlineStr);
    const diff = (due - today) / (1000 * 60 * 60); // Difference in hours

    if (diff > 0 && diff <= 24) {
        alert(`⚠️ URGENT: "${taskName}" is due within 24 hours!`);
    }
}

/* TIMER */
let timeLeft = 1500, timerId = null;
function toggleTimer() {
    if (timerId) { clearInterval(timerId); timerId = null; }
    else { timerId = setInterval(() => { timeLeft--; updateTimerDisp(); }, 1000); }
}
function updateTimerDisp() {
    let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
}

/* CHART & TASKS */
let subjectData = {}, myChart = null;
document.getElementById('taskForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('task_name').value;
    const subj = document.getElementById('subject').value || "General";
    const date = document.getElementById('deadline').value;
    const prio = document.getElementById('priority').value;

    // Check for 24hr warning
    checkDeadline(name, date);

    // Update Chart
    subjectData[subj] = (subjectData[subj] || 0) + 1;
    renderChart();

    // Add to Table
    const row = `<tr>
        <td>${name}</td><td>${subj}</td><td>${date}</td>
        <td><span class="badge badge-${prio.toLowerCase()}">${prio}</span></td>
    </tr>`;
    document.getElementById('taskTableBody').insertAdjacentHTML('afterbegin', row);
    this.reset();
});

function renderChart() {
    const ctx = document.getElementById('subjectChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(subjectData),
            datasets: [{ data: Object.values(subjectData), backgroundColor: ['#3498db','#e74c3c','#2ecc71','#f1c40f'] }]
        }
    });
}

function toggleFocus() { document.body.classList.toggle('focus-active'); }
</script>
</body>
</html>
