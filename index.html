<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySmart | Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header-section { background: #2c3e50; color: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>
<div class="card p-3 mb-3 text-center shadow-sm">
    <h6>🍅 Pomodoro Timer</h6>
    <h2 id="timerDisplay">25:00</h2>
    <button class="btn btn-sm btn-primary" onclick="toggleTimer()" id="timerBtn">Start</button>
</div>
<div class="header-section mb-4">
    <h1>STUDY SMART</h1>
    <p>Manage your Academic Deadlines Efficiently</p>
</div>
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="m-0">My Pending Tasks</h5>
    <span class="badge bg-primary rounded-pill" id="taskCounter">0 Tasks</span>
</div>
<div class="progress mb-3" style="height: 10px;">
  <div id="taskProgress" class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 0%"></div>
</div>
<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4">
                <h5 class="mb-3">Add New Task</h5>
                <form id="taskForm">
                    <div class="mb-3">
                        <label>Task Name</label>
                        <input type="text" id="task_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Subject</label>
                        <input type="text" id="subject" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Deadline</label>
                        <input type="date" id="deadline" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Priority</label>
                        <select id="priority" class="form-select">
                            <option>High</option>
                            <option>Medium</option>
                            <option>Low</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Save Task</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <h5 class="mb-3">My Pending Tasks</h5>
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Task</th>
                            <th>Subject</th>
                            <th>Deadline</th>
                            <th>Priority</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* The animated gradient header */
    .header-section { 
        background: linear-gradient(-45deg, #2c3e50, #4ca1af, #2c3e50);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        color: white; padding: 40px; text-align: center; 
    }
    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .card { border-radius: 15px; transition: transform 0.3s ease; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
    
    /* Priority Colors */
    .badge-high { background-color: #e74c3c; }
    .badge-medium { background-color: #f1c40f; color: black; }
    .badge-low { background-color: #2ecc71; }
</style>
<script>
let timeLeft = 1500; // 25 minutes in seconds
let timerId = null;

function toggleTimer() {
    if (timerId) {
        clearInterval(timerId);
        timerId = null;
        document.getElementById('timerBtn').innerText = "Start";
    } else {
        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft === 0) clearInterval(timerId);
        }, 1000);
        document.getElementById('timerBtn').innerText = "Pause";
    }
}

function updateDisplay() {
    let mins = Math.floor(timeLeft / 60);
    let secs = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = 
        `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}
document.getElementById('taskForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Get the data from your form
    const name = document.getElementById('task_name').value;
    const subj = document.getElementById('subject').value;
    const date = document.getElementById('deadline').value;
    const prio = document.getElementById('priority').value;

    // Pick the right color for the priority badge
    let badgeClass = 'badge-low';
    if(prio === 'High') badgeClass = 'badge-high';
    if(prio === 'Medium') badgeClass = 'badge-medium';

    // 1. Prepare data for PHP
    let formData = new FormData(this);

    // 2. Send to your save_task.php
    fetch('save_task.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        // 3. Add to the table immediately (lively effect!)
        const tableBody = document.getElementById('taskTableBody');
        const newRow = `
            <tr style="animation: fadeIn 0.5s forwards">
                <td><strong>${name}</strong></td>
                <td>${subj}</td>
                <td>${date}</td>
                <td><span class="badge ${badgeClass}">${prio}</span></td>
            </tr>
        `;
        tableBody.insertAdjacentHTML('afterbegin', newRow);
        
        // 4. Reset form
        document.getElementById('taskForm').reset();
function calculateUrgency(priority, deadline) {
    const today = new Date();
    const due = new Date(deadline);
    const diffTime = due - today;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
    
    let priorityWeight = priority === 'High' ? 30 : (priority === 'Medium' ? 20 : 10);
    
    // A smaller diffDays (closer deadline) increases the total score
    return priorityWeight - diffDays; 
}
    });
});
</script>

</body>
</html>
