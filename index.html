<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart | Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: radial-gradient(circle at top, #f8fcff 0%, #eef2ff 40%, #f9f0ff 100%);
            --text-color: #1f2937;
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: rgba(99, 102, 241, 0.2);
            --accent: #6d28d9;
            --accent-alt: #0ea5e9;
            --table-hover: rgba(79, 70, 229, 0.08);
        }

        [data-theme="dark"] {
            --bg-color: radial-gradient(circle at top, #101827 0%, #0f172a 45%, #111827 100%);
            --text-color: #e5e7eb;
            --card-bg: rgba(30, 41, 59, 0.88);
            --card-border: rgba(100, 116, 139, 0.28);
            --accent: #94a3b8;
            --accent-alt: #64748b;
            --table-hover: rgba(100, 116, 139, 0.16);
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s;
            min-height: 100vh;
        }

        .header-section {
            background: linear-gradient(-45deg, #7c3aed, #0ea5e9, #f43f5e, #7c3aed);
            background-size: 320% 320%;
            animation: gradient 14s ease infinite;
            color: white;
            padding: 48px 32px;
            text-align: center;
            border-radius: 0 0 28px 28px;
            box-shadow: 0 18px 45px rgba(79, 70, 229, 0.35);
        }

        .header-section p {
            opacity: 0.92;
            font-size: 1.08rem;
        }

        [data-theme="dark"] .header-section {
            background: linear-gradient(-45deg, #334155, #1f2937, #0f172a, #334155);
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.55);
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-group .btn {
            border-width: 2px;
            backdrop-filter: blur(6px);
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            border: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #059669, #10b981);
            border: none;
            font-weight: 700;
        }

        .card {
            background-color: var(--card-bg);
            color: var(--text-color);
            border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 28px rgba(79, 70, 229, 0.12);
            margin-bottom: 20px;
            backdrop-filter: blur(8px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(14, 165, 233, 0.18);
        }

        .table thead th {
            color: var(--accent);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .table tbody tr:hover {
            background-color: var(--table-hover);
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.55);
        }

        .badge-high { background: linear-gradient(135deg, #ef4444, #dc2626) !important; }
        .badge-medium { background: linear-gradient(135deg, #facc15, #f59e0b) !important; color: #111827 !important; }
        .badge-low { background: linear-gradient(135deg, #22c55e, #16a34a) !important; }

        #taskCounter {
            background: linear-gradient(135deg, var(--accent), var(--accent-alt)) !important;
            font-size: 0.85rem;
            padding: 8px 12px;
            border-radius: 999px;
        }

        .focus-active .header-section,
        .focus-active .col-md-4 { display: none; }

        .focus-active .col-md-8 { width: 100%; }
        .focus-back-bar {
            display: none;
            margin: 16px 0;
        }

        .focus-active .focus-back-bar {
            display: block;
        }

        .timer-controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .timer-controls input {
            max-width: 110px;
            text-align: center;
        }

        #statusMessage {
            display: none;
            margin-bottom: 12px;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        #statusMessage.info {
            display: block;
            background: rgba(14, 165, 233, 0.14);
            color: #0c4a6e;
        }

        #statusMessage.success {
            display: block;
            background: rgba(34, 197, 94, 0.18);
            color: #14532d;
        }

        #statusMessage.warning {
            display: block;
            background: rgba(245, 158, 11, 0.2);
            color: #78350f;
        }

        [data-theme="dark"] #statusMessage.info {
            background: rgba(14, 116, 144, 0.32);
            color: #dbeafe;
        }

        [data-theme="dark"] #statusMessage.success {
            background: rgba(21, 128, 61, 0.35);
            color: #dcfce7;
        }

        [data-theme="dark"] #statusMessage.warning {
            background: rgba(146, 64, 14, 0.35);
            color: #ffedd5;
        }
    </style>
</head>
<body>

<div class="header-section mb-4">
    <h1>STUDY SMART</h1>
    <p>Manage your Academic Deadlines Efficiently</p>
    <div class="btn-group">
        <button class="btn btn-outline-light btn-sm" onclick="toggleFocus()">Focus Mode</button>
        <button class="btn btn-outline-light btn-sm" onclick="toggleDarkMode()">Dark Mode</button>
    </div>
</div>

<div class="container">
    <div id="statusMessage" role="status" aria-live="polite"></div>
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>🍅 Pomodoro Timer</h6>
                <h2 id="timerDisplay">25:00</h2>
                <button class="btn btn-primary btn-sm" onclick="toggleTimer()" id="timerBtn">Start</button>
                <div class="timer-controls">
                    <input type="number" id="timerMinutes" class="form-control form-control-sm" min="1" max="180" value="25" aria-label="Timer minutes">
                    <button class="btn btn-outline-primary btn-sm" type="button" onclick="setTimerMinutes()">Set</button>
                </div>
            </div>

            <div class="card p-4">
                <h5>Add New Task</h5>
                <form id="taskForm">
                    <input type="text" id="task_name" class="form-control mb-2" placeholder="Task Name" required>
                    <input type="text" id="subject" class="form-control mb-2" placeholder="Subject">
                    <input type="date" id="deadline" class="form-control mb-2" required>
                    <select id="priority" class="form-select mb-3">
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <button type="submit" class="btn btn-success w-100">Save Task</button>
                </form>
            </div>

            <div class="card p-3">
                <h6 class="text-center">📊 Subject Distribution</h6>
                <canvas id="subjectChart"></canvas>
            </div>
        </div>

        <div class="col-md-8">
            <div class="focus-back-bar">
                <button class="btn btn-outline-primary btn-sm" type="button" onclick="toggleFocus()">Back to Full View</button>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 id="tableTitle">Pending Tasks</h5>
                <span class="badge bg-primary" id="taskCounter">0 Tasks</span>
            </div>
            <div class="card p-3">
                <table class="table" style="color: inherit;">
                    <thead>
                        <tr><th>Task</th><th>Subject</th><th>Deadline</th><th>Priority</th></tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// 1. SUPABASE INITIALIZATION
const supabaseUrl = 'https://lafiafbqccrojlkjgcvk.supabase.co';
const supabaseKey = 'sb_publishable_TLRwCGXv6swosm6ntUguow_aRSkS0We';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
window.alert = function() {};

// 2. FETCH TASKS ON LOAD
function showStatus(message, type = "info") {
    const box = document.getElementById('statusMessage');
    box.className = '';
    box.classList.add(type);
    box.innerText = message;
}

function addTaskRow(task, position = 'beforeend') {
    const tableBody = document.getElementById('taskTableBody');
    const row = `<tr>
        <td>${task.task_name}</td>
        <td>${task.subject || "General"}</td>
        <td>${task.deadline}</td>
        <td><span class="badge badge-${task.priority.toLowerCase()}">${task.priority}</span></td>
    </tr>`;
    tableBody.insertAdjacentHTML(position, row);
}

async function fetchTasks() {
    const { data: tasks, error } = await _supabase
        .from('tasks')
        .select('*')
        .order('id', { ascending: false });

    if (error) {
        console.error("Fetch Error:", error);
        showStatus("Unable to load tasks from cloud", "warning");
        return;
    }

    const tableBody = document.getElementById('taskTableBody');
    tableBody.innerHTML = '';
    let currentSubjectData = {};

    tasks.forEach(task => {
        addTaskRow(task);
        let subj = task.subject || "General";
        currentSubjectData[subj] = (currentSubjectData[subj] || 0) + 1;
    });

    document.getElementById('taskCounter').innerText = `${tasks.length} Tasks`;
    updateChart(currentSubjectData);
}

// 3. SAVE TASK
document.getElementById('taskForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('task_name').value;
    const date = document.getElementById('deadline').value;

    const taskData = {
        task_name: name,
        subject: document.getElementById('subject').value || "General",
        deadline: date,
        priority: document.getElementById('priority').value
    };

    addTaskRow(taskData, 'afterbegin');
    const counter = document.getElementById('taskCounter');
    const currentCount = parseInt(counter.innerText, 10) || 0;
    counter.innerText = `${currentCount + 1} Tasks`;
    checkDeadline(name, date);

    const { error } = await _supabase
        .from('tasks')
        .insert([taskData]);

    if (error) {
        showStatus("Saved locally. Cloud sync failed", "warning");
        this.reset();
        return;
    }

    this.reset();
    showStatus("Task saved", "success");
    fetchTasks();
});

// 4. CHART LOGIC
let myChart = null;
function updateChart(data) {
    const ctx = document.getElementById('subjectChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(data),
            datasets: [{ data: Object.values(data), backgroundColor: ['#3498db','#e74c3c','#2ecc71','#f1c40f'] }]
        }
    });
}

// 5. UTILITIES (TIMER, DARK MODE, FOCUS)
let timeLeft = 1500, timerId = null;
function toggleTimer() {
    if (timerId) {
        clearInterval(timerId);
        timerId = null;
        document.getElementById('timerBtn').innerText = "Start";
        return;
    }

    timerId = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 0;
            document.getElementById('timerBtn').innerText = "Start";
            showStatus("Timer complete", "info");
        }
        updateTimerDisp();
    }, 1000);
    document.getElementById('timerBtn').innerText = "Pause";
}

function setTimerMinutes() {
    const value = parseInt(document.getElementById('timerMinutes').value, 10);
    if (Number.isNaN(value) || value < 1 || value > 180) {
        showStatus("Enter a value from 1 to 180 minutes", "warning");
        return;
    }

    if (timerId) {
        clearInterval(timerId);
        timerId = null;
        document.getElementById('timerBtn').innerText = "Start";
    }

    timeLeft = value * 60;
    updateTimerDisp();
}

function updateTimerDisp() {
    let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
}
function checkDeadline(taskName, deadlineStr) {
    const diff = (new Date(deadlineStr) - new Date()) / (1000 * 60 * 60);
    if (diff > 0 && diff <= 24) showStatus(`Urgent: ${taskName} is due in less than 24 hours`, "warning");
}
function toggleDarkMode() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
function toggleFocus() { document.body.classList.toggle('focus-active'); }

// Run on page load
fetchTasks();
</script>
</body>
</html>
