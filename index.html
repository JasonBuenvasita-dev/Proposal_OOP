<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart | Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ─── DESIGN TOKENS ─────────────────────────────────────── */
        :root {
            --bg: #f0f2ff;
            --surface: rgba(255,255,255,0.96);
            --surface-up: #ffffff;
            --card-border: rgba(109,40,217,0.10);
            --text: #1e1b4b;
            --text-muted: #6b63a4;
            --accent: #7c3aed;
            --accent2: #0ea5e9;
            --input-bg: #f8f7ff;
            --input-border: #e0d9ff;
            --shadow-sm: 0 2px 8px rgba(109,40,217,0.07);
            --shadow: 0 8px 32px rgba(109,40,217,0.10);
            --shadow-lg: 0 16px 48px rgba(109,40,217,0.14);
            --header-grad: linear-gradient(-45deg,#7c3aed,#0ea5e9,#f43f5e,#7c3aed);
            --radius: 16px;
            --radius-sm: 10px;
        }

        [data-theme="dark"] {
            --bg: #0f0e1a;
            --surface: rgba(22,20,40,0.97);
            --surface-up: #1c1932;
            --card-border: rgba(139,92,246,0.15);
            --text: #ede9fe;
            --text-muted: #9d8fe0;
            --accent: #a78bfa;
            --accent2: #38bdf8;
            --input-bg: #1a1730;
            --input-border: #2e2850;
        }

        /* ─── RESET & BASE ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            transition: background 0.35s, color 0.35s;
        }

        /* ─── HEADER ────────────────────────────────────────────── */
        .app-header {
            background: var(--header-grad);
            background-size: 320% 320%;
            animation: gradientShift 14s ease infinite;
            height: 64px; padding: 0 32px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 24px rgba(109,40,217,0.22);
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .header-logo { font-family: 'Space Grotesk', sans-serif; color: #fff; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .pill-btn {
            padding: 6px 18px; border-radius: 100px; border: 1.5px solid rgba(255,255,255,0.32);
            background: rgba(255,255,255,0.12); color: #fff; font-size: 0.82rem; cursor: pointer;
        }

        /* ─── APP BODY ──────────────────────────────────────────── */
        .app-body { padding: 40px 24px; max-width: 1200px; margin: 0 auto; }
        .panel {
            background: var(--surface); border: 1px solid var(--card-border);
            border-radius: var(--radius); box-shadow: var(--shadow);
            padding: 24px; margin-bottom: 24px; backdrop-filter: blur(12px);
        }

        .timer-display {
            font-family: 'JetBrains Mono', monospace; font-size: 3.2rem;
            font-weight: 700; color: var(--accent); text-align: center;
        }

        /* ─── TABLE ─────────────────────────────────────────────── */
        .priority-badge { padding: 3px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge-high { background: rgba(239,68,68,0.1); color: #ef4444; }
        .badge-medium { background: rgba(245,158,11,0.1); color: #d97706; }
        .badge-low { background: rgba(34,197,94,0.1); color: #16a34a; }

        .d-none { display: none !important; }
        .btn-primary-action {
            width: 100%; padding: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-logo">📚 StudySmart</div>
    <div class="header-controls">
        <button class="pill-btn" onclick="toggleDarkMode()">🌙 Theme</button>
        <button class="pill-btn" id="logoutBtn" style="display:none;" onclick="signOut()">Sign Out</button>
    </div>
</header>

<div class="app-body">
    <div class="auth-wrap mx-auto" id="auth-section" style="max-width: 400px;">
        <div class="panel">
            <h2 class="mb-4 fw-bold">Login</h2>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">
            <input type="password" id="password" class="form-control mb-4" placeholder="Password">
            <button class="btn-primary-action" onclick="handleAuth()">Submit</button>
            <p class="text-center mt-3 small"><a href="#" onclick="toggleAuthMode()" id="toggleLink">Create Account</a></p>
        </div>
    </div>

    <div id="main-app" class="d-none">
        <div class="row g-4">
            <div class="col-12 mb-2">
                <div class="row g-3">
                    <div class="col-6 col-md-3">
                        <div class="panel text-center mb-0">
                            <div class="small text-muted mb-1">🚨 DUE TODAY</div>
                            <div id="dueCount" class="h2 fw-bold mb-0">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="panel text-center mb-0">
                            <div class="small text-muted mb-1">📚 SUBJECTS</div>
                            <div id="subjectCount" class="h2 fw-bold mb-0 text-info">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="panel">
                    <div class="timer-display" id="timerDisplay">25:00</div>
                    <button class="btn w-100 btn-outline-primary mt-3 rounded-pill" onclick="toggleTimer()" id="timerBtn">Start Focus</button>
                </div>

                <div class="panel">
                    <h6 class="text-muted fw-bold mb-3">NEW TASK</h6>
                    <input type="text" id="task_name" class="form-control mb-2" placeholder="Task Name">
                    <input type="text" id="subject" class="form-control mb-2" placeholder="Subject">
                    <input type="date" id="deadline" class="form-control mb-2">
                    <input type="file" id="task_image" class="form-control mb-3">
                    <select id="priority" class="form-select mb-4">
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <button class="btn-primary-action" onclick="saveTask()">Save Task</button>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="panel p-0 overflow-hidden">
                    <table class="table mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Task</th>
                                <th>Subject</th>
                                <th>Due</th>
                                <th>Priority</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // INITIALIZE SUPABASE
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_ANON_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isSignUp = false;
    let timerInterval;
    let timeLeft = 1500;
    let isRunning = false;

    // AUTH LOGIC
    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('toggleLink').innerText = isSignUp ? "Back to Login" : "Create Account";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = isSignUp 
            ? await supabase.auth.signUp({ email, password })
            : await supabase.auth.signInWithPassword({ email, password });

        if (error) alert(error.message);
        else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('d-none');
            document.getElementById('main-app').classList.remove('d-none');
            document.getElementById('logoutBtn').style.display = 'block';
            fetchTasks();
        }
    }

    async function signOut() {
        await supabase.auth.signOut();
        location.reload();
    }

    // TASK LOGIC
    async function saveTask() {
        const { data: { user } } = await supabase.auth.getUser();
        const file = document.getElementById('task_image').files[0];
        let imageUrl = '';

        if (file) {
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await supabase.storage.from('task-images').upload(fileName, file);
            if (!error) {
                const { data: publicUrl } = supabase.storage.from('task-images').getPublicUrl(fileName);
                imageUrl = publicUrl.publicUrl;
            }
        }

        const { error } = await supabase.from('tasks').insert([{
            task_name: document.getElementById('task_name').value,
            subject: document.getElementById('subject').value,
            deadline: document.getElementById('deadline').value,
            priority: document.getElementById('priority').value,
            image_url: imageUrl,
            user_id: user.id
        }]);

        if (!error) fetchTasks();
    }

    async function fetchTasks() {
        const { data, error } = await supabase.from('tasks').select('*').order('deadline', { ascending: true });
        if (!error) renderTable(data);
    }

    function renderTable(tasks) {
        const tbody = document.getElementById('taskTableBody');
        const today = new Date().toISOString().split('T')[0];
        let dueToday = 0;
        let subjects = new Set();

        tasks.forEach(t => {
            if (t.deadline === today) dueToday++;
            if (t.subject) subjects.add(t.subject.trim().toUpperCase());
        });

        document.getElementById('dueCount').innerText = dueToday;
        document.getElementById('subjectCount').innerText = subjects.size;

        tbody.innerHTML = tasks.map(t => `
            <tr>
                <td class="fw-bold">${t.task_name}</td>
                <td>${t.subject}</td>
                <td class="small">${t.deadline}</td>
                <td><span class="priority-badge badge-${t.priority.toLowerCase()}">${t.priority}</span></td>
                <td><button class="btn btn-sm" onclick="deleteTask(${t.id})">🗑</button></td>
            </tr>
        `).join('');
    }

    async function deleteTask(id) {
        await supabase.from('tasks').delete().eq('id', id);
        fetchTasks();
    }

    // TIMER LOGIC
    function toggleTimer() {
        const btn = document.getElementById('timerBtn');
        if (isRunning) {
            clearInterval(timerInterval);
            btn.innerText = "Start Focus";
        } else {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) clearInterval(timerInterval);
            }, 1000);
            btn.innerText = "Pause";
        }
        isRunning = !isRunning;
    }

    function updateTimerUI() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function toggleDarkMode() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    window.onload = checkUser;
</script>
</body>
</html>
