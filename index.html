<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySmart | Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header-section { background: #2c3e50; color: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="header-section mb-4">
    <h1>STUDY SMART</h1>
    <p>Manage your Academic Deadlines Efficiently</p>
</div>
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="m-0">My Pending Tasks</h5>
    <span class="badge bg-primary rounded-pill" id="taskCounter">0 Tasks</span>
</div>
<div class="progress mb-3" style="height: 10px;">
  <div id="taskProgress" class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 0%"></div>
</div>
<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4">
                <h5 class="mb-3">Add New Task</h5>
                <form id="taskForm">
                    <div class="mb-3">
                        <label>Task Name</label>
                        <input type="text" id="task_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Subject</label>
                        <input type="text" id="subject" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Deadline</label>
                        <input type="date" id="deadline" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Priority</label>
                        <select id="priority" class="form-select">
                            <option>High</option>
                            <option>Medium</option>
                            <option>Low</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Save Task</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <h5 class="mb-3">My Pending Tasks</h5>
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Task</th>
                            <th>Subject</th>
                            <th>Deadline</th>
                            <th>Priority</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('taskForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Create form data to send to PHP
    let formData = new FormData();
    formData.append('task_name', document.getElementById('task_name').value);
    formData.append('subject', document.getElementById('subject').value);
    formData.append('deadline', document.getElementById('deadline').value);
    formData.append('priority', document.getElementById('priority').value);

    // Use Fetch API (JavaScript) to talk to your save_task.php
    fetch('save_task.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        if(data.trim() === "Success") {
            alert("Task Added Successfully!");
            location.reload(); // Refresh to see the new task
        } else {
            alert("Error: " + data);
        }
    });
});
</script>

</body>
</html>
