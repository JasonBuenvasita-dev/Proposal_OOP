<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart | Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; transition: all 0.3s; }
        
        /* Header & Animations */
        .header-section { 
            background: linear-gradient(-45deg, #2c3e50, #4ca1af, #2c3e50);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white; padding: 40px; text-align: center; 
            border-radius: 0 0 20px 20px;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Card Styling */
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        
        /* Priority Colors */
        .badge-high { background-color: #e74c3c; }
        .badge-medium { background-color: #f1c40f; color: black; }
        .badge-low { background-color: #2ecc71; }

        /* Focus Mode Logic */
        .focus-active .header-section, 
        .focus-active .col-md-4, 
        .focus-active .analytics-box { display: none; }
        .focus-active .col-md-8 { width: 100%; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="header-section mb-4">
    <h1>STUDY SMART</h1>
    <p>Manage your Academic Deadlines Efficiently</p>
    <button class="btn btn-outline-light btn-sm" id="focusBtn" onclick="toggleFocus()">Focus Mode</button>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 mb-3 text-center shadow-sm">
                <h6>🍅 Pomodoro Timer</h6>
                <h2 id="timerDisplay" class="display-6 fw-bold">25:00</h2>
                <button class="btn btn-primary w-100" onclick="toggleTimer()" id="timerBtn">Start Study Session</button>
            </div>

            <div class="card p-3 mb-3 analytics-box">
                <h6>📊 Task Distribution</h6>
                <canvas id="subjectChart"></canvas>
            </div>

            <div class="card p-4">
                <h5 class="mb-3">Add New Task</h5>
                <form id="taskForm">
                    <div class="mb-3">
                        <label class="form-label">Task Name</label>
                        <input type="text" id="task_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" id="subject" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deadline</label>
                        <input type="date" id="deadline" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Priority</label>
                        <select id="priority" class="form-select">
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Save Task</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">My Pending Tasks</h5>
                <span class="badge bg-primary rounded-pill" id="taskCounter">0 Tasks</span>
            </div>
            
            <div class="progress mb-3" style="height: 10px;">
                <div id="taskProgress" class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 0%"></div>
            </div>

            <div class="card p-4">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Task</th>
                            <th>Subject</th>
                            <th>Deadline</th>
                            <th>Priority</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
/* 1. TIMER LOGIC */
let timeLeft = 1500; 
let timerId = null;

function toggleTimer() {
    if (timerId) {
        clearInterval(timerId);
        timerId = null;
        document.getElementById('timerBtn').innerText = "Start Study Session";
    } else {
        timerId = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                clearInterval(timerId);
                alert("Session Complete! Take a break.");
            }
        }, 1000);
        document.getElementById('timerBtn').innerText = "Pause";
    }
}

function updateDisplay() {
    let mins = Math.floor(timeLeft / 60);
    let secs = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

/* 2. FOCUS MODE */
function toggleFocus() {
    document.body.classList.toggle('focus-active');
    let btn = document.getElementById('focusBtn');
    btn.innerText = document.body.classList.contains('focus-active') ? "Exit Focus" : "Focus Mode";
}

/* 3. TASK & ANALYTICS LOGIC */
let taskCount = 0;
let subjectCounts = {};

document.getElementById('taskForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('task_name').value;
    const subj = document.getElementById('subject').value || "General";
    const date = document.getElementById('deadline').value;
    const prio = document.getElementById('priority').value;

    let badgeClass = `badge-${prio.toLowerCase()}`;

    // Update Analytics Data
    subjectCounts[subj] = (subjectCounts[subj] || 0) + 1;
    updateChart();

    // Visual Table Update
    const tableBody = document.getElementById('taskTableBody');
    const newRow = `
        <tr style="animation: fadeIn 0.5s forwards">
            <td><strong>${name}</strong></td>
            <td>${subj}</td>
            <td>${date}</td>
            <td><span class="badge ${badgeClass}">${prio}</span></td>
        </tr>
    `;
    tableBody.insertAdjacentHTML('afterbegin', newRow);

    // Update Counters
    taskCount++;
    document.getElementById('taskCounter').innerText = `${taskCount} Tasks`;
    document.getElementById('taskProgress').style.width = "50%"; // Example progress

    // Reset Form
    this.reset();
});

/* 4. CHART INITIALIZATION */
let myChart = null;
function updateChart() {
    const ctx = document.getElementById('subjectChart').getContext('2d');
    if (myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(subjectCounts),
            datasets: [{
                data: Object.values(subjectCounts),
                backgroundColor: ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6']
            }]
        },
        options: { plugins: { legend: { position: 'bottom' } } }
    });
}
</script>

</body>
</html>
