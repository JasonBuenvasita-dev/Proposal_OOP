<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart | Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #f8f9ff;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --accent: #2563eb;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --text-color: #f3f4f6;
            --card-bg: #1f2937;
            --card-border: #374151;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: 0.3s;
            padding-top: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .btn-primary { background-color: #2563eb; border: none; }
        .btn-success { background-color: #059669; border: none; }

        .badge-high { background-color: #ef4444; }
        .badge-medium { background-color: #f59e0b; }
        .badge-low { background-color: #10b981; }

        #statusMessage {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: none;
            border-radius: 12px;
        }
        .show-msg { display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="statusMessage" class="alert shadow" role="status"></div>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <div class="mb-2">🍅 Pomodoro Timer</div>
                <h2 id="timerDisplay" class="display-4 fw-bold">25:00</h2>
                <button class="btn btn-primary w-100 py-2" onclick="toggleTimer()" id="timerBtn">Start</button>
            </div>

            <div class="card p-4">
                <h5 class="mb-3">Add New Task</h5>
                <form id="taskForm">
                    <input type="text" id="task_name" class="form-control mb-2" placeholder="Task Name" required>
                    <input type="text" id="subject" class="form-control mb-2" placeholder="Subject">
                    <input type="date" id="deadline" class="form-control mb-2" required>
                    <select id="priority" class="form-select mb-3">
                        <option value="High">High</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <button type="submit" class="btn btn-success w-100 py-2">Save Task</button>
                </form>
            </div>

            <div class="card p-3">
                <h6 class="text-center mb-3">📊 Subject Distribution</h6>
                <canvas id="subjectChart"></canvas>
            </div>
        </div>

        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold">Pending Tasks</h4>
                <span class="badge bg-primary rounded-pill" id="taskCounter">0 Tasks</span>
            </div>
            
            <div class="card p-0 overflow-hidden">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Task</th>
                            <th>Subject</th>
                            <th>Deadline</th>
                            <th class="pe-4">Priority</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// Database Configuration
const supabaseUrl = 'https://hjdkiwuhclyohphtwwai.supabase.co';
const supabaseKey = 'sb_publishable_TLRwCGXv6swosm6ntUguow_aRSkS0We';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

let myChart = null;

// Notification System
function showStatus(message, type = "success") {
    const box = document.getElementById('statusMessage');
    box.className = `alert alert-${type} show-msg`;
    box.innerText = message;
    setTimeout(() => { box.classList.remove('show-msg'); }, 3000);
}

// Fetch and Sync Data
async function fetchTasks() {
    const { data: tasks, error } = await _supabase
        .from('tasks')
        .select('*')
        .order('deadline', { ascending: true });

    if (error) {
        showStatus("Sync Error: " + error.message, "danger");
        return;
    }

    const tableBody = document.getElementById('taskTableBody');
    tableBody.innerHTML = '';
    let subjectCounts = {};

    tasks.forEach(task => {
        // Build Table
        const row = `<tr>
            <td class="ps-4">${task.task_name}</td>
            <td>${task.subject || "General"}</td>
            <td>${task.deadline}</td>
            <td class="pe-4"><span class="badge badge-${task.priority.toLowerCase()}">${task.priority}</span></td>
        </tr>`;
        tableBody.insertAdjacentHTML('beforeend', row);

        // Prep Chart Data
        let subj = task.subject || "General";
        subjectCounts[subj] = (subjectCounts[subj] || 0) + 1;
    });

    document.getElementById('taskCounter').innerText = `${tasks.length} Tasks`;
    updateChart(subjectCounts);
}

// Render Pie Chart
function updateChart(data) {
    const ctx = document.getElementById('subjectChart').getContext('2d');
    if (myChart) myChart.destroy();
    
    if (Object.keys(data).length === 0) return;

    myChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(data),
            datasets: [{
                data: Object.values(data),
                backgroundColor: ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6'],
                borderWidth: 2,
                borderColor: getComputedStyle(document.body).getPropertyValue('--card-bg')
            }]
        },
        options: {
            plugins: {
                legend: { position: 'bottom', labels: { boxWidth: 12, padding: 15 } }
            }
        }
    });
}

// Handle Form Submission
document.getElementById('taskForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const taskData = {
        task_name: document.getElementById('task_name').value,
        subject: document.getElementById('subject').value || "General",
        deadline: document.getElementById('deadline').value,
        priority: document.getElementById('priority').value
    };

    const { error } = await _supabase.from('tasks').insert([taskData]);

    if (error) {
        showStatus("Error: " + error.message, "danger");
    } else {
        showStatus("Task saved to the cloud!");
        this.reset();
        fetchTasks();
    }
});

// Timer Logic
let timeLeft = 1500, timerId = null;
function toggleTimer() {
    const btn = document.getElementById('timerBtn');
    if (timerId) {
        clearInterval(timerId);
        timerId = null;
        btn.innerText = "Start";
    } else {
        btn.innerText = "Pause";
        timerId = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(timeLeft <= 0) { clearInterval(timerId); showStatus("Focus session complete!", "info"); }
        }, 1000);
    }
}

window.onload = fetchTasks;
</script>
</body>
</html>
